<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gymnee への招待 — 一緒にトレーニングを記録しよう</title>
<meta name="description" content="友達があなたを Gymnee に招待しています。ジムを変えても記録が1本につながる筋トレアプリ。アプリを入手して、フレンドとモチベーションを共有しましょう。">
<meta property="og:title" content="Gymneeで一緒にトレーニングを記録しよう">
<meta property="og:description" content="友達があなたを Gymnee に招待しています。アプリを入手して、フレンドとモチベーションを共有しましょう。">
<meta property="og:image" content="../assets/gymnee-icon.png">
<meta name="theme-color" content="#0B0D0C">
<link rel="icon" href="../assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0B0D0C; --bg1:#131614; --lime:#C6FF3D; --lime-bright:#D8FF6B;
  --text:#F4F7F2; --muted:#A7AEA6; --line:#272C28;
  --glow:0 0 80px rgba(199,255,61,.28);
  --display:"Bricolage Grotesque","Zen Kaku Gothic New",sans-serif;
  --jp:"Zen Kaku Gothic New",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg0);color:var(--text);font-family:var(--jp);line-height:1.75;
  -webkit-font-smoothing:antialiased;min-height:100svh;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
main{max-width:440px;text-align:center}
.icon{width:88px;height:88px;border-radius:22px;margin:0 auto 22px;box-shadow:0 0 0 1px rgba(255,255,255,.08),var(--glow)}
h1{font-family:var(--display);font-weight:800;font-size:1.6rem;line-height:1.3;letter-spacing:-.02em}
h1 .lime{color:var(--lime)}
p{margin-top:14px;color:var(--muted);font-size:.95rem}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;margin-top:26px;
  font-weight:700;border-radius:13px;padding:15px 30px;font-size:1rem;text-decoration:none;
  background:var(--lime);color:var(--bg0);box-shadow:var(--glow);transition:.18s;
}
.btn:hover{background:var(--lime-bright);transform:translateY(-2px)}
.note{margin-top:22px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<main>
  <img class="icon" src="../assets/gymnee-icon.png" alt="Gymnee">
  <h1>友達があなたを<br><span class="lime">Gymnee</span> に招待しています</h1>
  <p>ジムを変えても、記録は続く。チェックインは写真を一枚撮るだけの筋トレ記録アプリです。アプリを入手して、フレンドとモチベーションを共有しましょう。</p>
  <a class="btn" href="../">アプリを入手する</a>
  <p class="note">すでに Gymnee をお使いの場合は、届いた招待リンクをもう一度タップすると、アプリで招待した友達のプロフィールが開きます。</p>
</main>
</body>
</html>
