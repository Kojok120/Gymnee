# Supabase CLI 設定。ローカル検証（supabase start）では project_id はローカル識別子として使う。
# dev プロジェクトは削除済み。prod 操作は Management API（setup_supabase_prod.sh の runsql /
# --project-ref 明示指定）で行い、ここを prod ref にはしない（bare `supabase db push` の誤爆防止）。
project_id = "gymnee-local"

# ローカルポートは既定(5432x)から +100 した専用ブロック(5442x)。1台で他のローカル Supabase
# プロジェクトを同時に動かしても衝突しないようにするため。アプリ(Debug)の接続先は API port の
# 127.0.0.1:54421（Config/Secrets.dev.xcconfig と docs/local-dev.md を参照）。
[api]
port = 54421
[db]
port = 54422
shadow_port = 54420
[db.pooler]
port = 54429
[studio]
port = 54423
[inbucket]
port = 54424
[analytics]
port = 54427

# send-push は DB トリガーから X-Push-Secret 認証で呼ぶため、Supabase の JWT 検証は無効化する。
[functions.send-push]
verify_jwt = false

# plan-workouts は Gemini を叩く課金関数。アプリ同梱の公開 publishable key だけで匿名実行
# （Gemini コスト乱用）されないよう JWT 検証を必須にする。クライアントは isBackendAuthenticated
# 時のみ Bearer(user JWT) 付きで呼ぶため、正規経路は影響を受けない。
[functions.plan-workouts]
verify_jwt = true
