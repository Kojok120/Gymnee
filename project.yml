name: Gymnee
options:
  bundleIdPrefix: com.gymnee
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: PG5P26J3W2
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

# 環境別シークレット（iOS の .env 相当）。Debug→dev / Release→prod。
# 実ファイルは .gitignore 済み。Config/Secrets.example.xcconfig を複製して値を入れる。
configFiles:
  Debug: Config/Secrets.dev.xcconfig
  Release: Config/Secrets.prod.xcconfig

targets:
  Gymnee:
    type: application
    platform: iOS
    sources:
      - path: Gymnee
      - path: Shared
      - path: SharedActivity
      - path: SharedConnectivity
    dependencies:
      - target: GymneeWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app
        PRODUCT_NAME: Gymnee
        CODE_SIGN_ENTITLEMENTS: Gymnee/Gymnee.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    info:
      path: Gymnee/Resources/Info.plist
      properties:
        CFBundleDisplayName: Gymnee
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        # 環境別シークレット（xcconfig → ビルド設定 → ここ → 実行時に Bundle から読む）。
        SUPABASE_HOST: "$(SUPABASE_HOST)"
        SUPABASE_KEY: "$(SUPABASE_KEY)"
        NSCameraUsageDescription: "ジムでの写真チェックインと進捗写真の撮影に使用します。"
        NSPhotoLibraryUsageDescription: "進捗写真やチェックイン写真の選択・保存に使用します。"
        NSPhotoLibraryAddUsageDescription: "生成した共有カードを写真ライブラリに保存するために使用します。"
        NSLocationWhenInUseUsageDescription: "現在地から近くのジムを自動で候補表示するために使用します。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "登録したジムへの接近時に自動チェックインを提案するために使用します。"
        NSHealthShareUsageDescription: "体重・体組成を読み込み、記録に反映するために使用します。"
        NSHealthUpdateUsageDescription: "ワークアウト記録をヘルスケアへ書き戻すために使用します。"
        NSMotionUsageDescription: "アクティビティの記録に使用します。"
        NSCalendarsFullAccessUsageDescription: "予定に合わせてワークアウト計画を立て、自動で組み替えるために使用します。"
        NSCalendarsUsageDescription: "予定に合わせてワークアウト計画を立てるために使用します。"

  GymneeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GymneeWidgets
      - path: Shared
      - path: SharedActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app.widgets
        PRODUCT_NAME: GymneeWidgets
        CODE_SIGN_ENTITLEMENTS: GymneeWidgets/GymneeWidgets.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
    info:
      path: GymneeWidgets/Info.plist
      properties:
        CFBundleDisplayName: Gymnee
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  GymneeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: GymneeWatch
      - path: Shared
      - path: SharedConnectivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app.watchkitapp
        PRODUCT_NAME: GymneeWatch
        CODE_SIGN_ENTITLEMENTS: GymneeWatch/GymneeWatch.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: GymneeWatch/Info.plist
      properties:
        CFBundleDisplayName: Gymnee
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        # 本体アプリのコンパニオンとして対応付け（WCSession ペアリングの前提）。
        WKCompanionAppBundleIdentifier: com.gymnee.app

  GymneeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GymneeTests
    dependencies:
      - target: Gymnee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Gymnee:
    build:
      targets:
        Gymnee: all
        GymneeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GymneeTests
