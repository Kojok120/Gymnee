name: Gymnee
options:
  bundleIdPrefix: com.gymnee
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    # App Store 承認済みバイナリ(0.1.0)より高い値でないと TestFlight アップロードが 90062 で弾かれる。
    # ストア表示バージョン（1.0 公開済 → 次は 1.0.1）と揃えて運用する。
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: PG5P26J3W2
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    # dev/prod を同一端末に併存させるため bundle id / App Group / 表示名を構成で分ける。
    # Debug = .dev サフィックス（Gymnee Dev・dev 接続）/ Release = 無印（Gymnee・prod 接続）。
    APP_GROUP_ID: group.com.gymnee.app$(BUNDLE_ID_SUFFIX)
  configs:
    Debug:
      BUNDLE_ID_SUFFIX: ".dev"
      APP_NAME_SUFFIX: " Dev"
    Release:
      BUNDLE_ID_SUFFIX: ""
      APP_NAME_SUFFIX: ""

# 環境別シークレット（iOS の .env 相当）。Debug→dev / Release→prod。
# 実ファイルは .gitignore 済み。Config/Secrets.example.xcconfig を複製して値を入れる。
configFiles:
  Debug: Config/Secrets.dev.xcconfig
  Release: Config/Secrets.prod.xcconfig

# 外部パッケージ。Google カレンダー連携は GoogleSignIn(認証)＋Calendar REST(自前) で行う
# （GTLRCalendar の重い Obj-C パッケージは入れず、Supabase 同様に REST を自前で叩く）。
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Gymnee:
    type: application
    platform: iOS
    sources:
      - path: Gymnee
      - path: Shared
      - path: SharedActivity
      - path: SharedConnectivity
    dependencies:
      - target: GymneeWidgets
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app$(BUNDLE_ID_SUFFIX)
        PRODUCT_NAME: Gymnee
        CODE_SIGN_ENTITLEMENTS: Gymnee/Gymnee.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    info:
      path: Gymnee/Resources/Info.plist
      properties:
        CFBundleDisplayName: "Gymnee$(APP_NAME_SUFFIX)"
        APP_GROUP_ID: "$(APP_GROUP_ID)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        # ローカル開発（Debug で `supabase start` のローカル Supabase＝http://127.0.0.1:54321 に接続）用の
        # ATS 例外。ローカル/プライベート宛の HTTP のみ許可し、公開ホスト(prod https)には無影響＝審査上も安全。
        # 本番の接続先は EnvironmentGuard で prod(https) のみに強制されるため、Release でこの例外が悪用される余地は無い。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # 環境別シークレット（xcconfig → ビルド設定 → ここ → 実行時に Bundle から読む）。
        SUPABASE_HOST: "$(SUPABASE_HOST)"
        SUPABASE_KEY: "$(SUPABASE_KEY)"
        # Google サインイン（カレンダー連携）。Google Cloud の iOS OAuth クライアント設定。
        GIDClientID: "$(GOOGLE_IOS_CLIENT_ID)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "$(GOOGLE_REVERSED_CLIENT_ID)"
        # Instagram ストーリーズ直接共有（canOpenURL 判定に必要）。
        LSApplicationQueriesSchemes:
          - instagram-stories
        # Meta for Developers のアプリID（ストーリーズ共有 API の必須パラメータ。未設定なら導線非表示）。
        MetaAppID: "$(META_APP_ID)"
        NSCameraUsageDescription: "ジムでの写真チェックインと進捗写真の撮影に使用します。"
        NSPhotoLibraryUsageDescription: "進捗写真やチェックイン写真の選択・保存に使用します。"
        NSPhotoLibraryAddUsageDescription: "生成した共有カードを写真ライブラリに保存するために使用します。"
        NSLocationWhenInUseUsageDescription: "現在地から近くのジムを自動で候補表示するために使用します。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "登録したジムへの接近時に自動チェックインを提案するために使用します。"
        NSHealthShareUsageDescription: "体重・体組成・睡眠・心拍変動を読み込み、記録への反映とワークアウト計画の強度調整に使用します。"
        NSHealthUpdateUsageDescription: "ワークアウト記録をヘルスケアへ書き戻すために使用します。"
        NSMotionUsageDescription: "アクティビティの記録に使用します。"
        NSCalendarsFullAccessUsageDescription: "予定に合わせてワークアウト計画を立て、自動で組み替えるために使用します。"
        NSCalendarsUsageDescription: "予定に合わせてワークアウト計画を立てるために使用します。"

  GymneeWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: GymneeWidgets
      - path: Shared
      - path: SharedActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app$(BUNDLE_ID_SUFFIX).widgets
        PRODUCT_NAME: GymneeWidgets
        CODE_SIGN_ENTITLEMENTS: GymneeWidgets/GymneeWidgets.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
    info:
      path: GymneeWidgets/Info.plist
      properties:
        CFBundleDisplayName: Gymnee
        APP_GROUP_ID: "$(APP_GROUP_ID)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  GymneeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: GymneeWatch
      - path: Shared
      - path: SharedConnectivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app$(BUNDLE_ID_SUFFIX).watchkitapp
        PRODUCT_NAME: GymneeWatch
        CODE_SIGN_ENTITLEMENTS: GymneeWatch/GymneeWatch.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: GymneeWatch/Info.plist
      properties:
        CFBundleDisplayName: "Gymnee$(APP_NAME_SUFFIX)"
        APP_GROUP_ID: "$(APP_GROUP_ID)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        # 本体アプリのコンパニオンとして対応付け（WCSession ペアリングの前提）。
        WKCompanionAppBundleIdentifier: com.gymnee.app$(BUNDLE_ID_SUFFIX)

  GymneeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GymneeTests
    dependencies:
      - target: Gymnee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymnee.app$(BUNDLE_ID_SUFFIX).tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Gymnee:
    build:
      targets:
        Gymnee: all
        GymneeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GymneeTests
