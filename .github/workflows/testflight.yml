name: TestFlight

# main にアップデートが入るたびに iOS アプリをビルドして TestFlight へ配信する。
# 初回のみ下記シークレット/変数を設定すれば、以後は push するだけで自動配信される。
#
# 必要な「Repository secrets」(Settings → Secrets and variables → Actions → Secrets):
#   ASC_KEY_ID            App Store Connect API キーの Key ID（ASC → Users and Access → Integrations → App Store Connect API で発行。役割は App Manager 以上）
#   ASC_ISSUER_ID         同ページの Issuer ID
#   ASC_API_KEY_P8        同 API キー(.p8) の中身を base64 化した文字列  例) base64 -i AuthKey_XXXX.p8 | pbcopy
#   DIST_CERT_P12         Apple Distribution 証明書(.p12) を base64 化した文字列（Xcode/Keychain から書き出し。秘密鍵込み）
#   DIST_CERT_PASSWORD    その .p12 のパスワード（DEV_CERT_P12 も同じパスワードを使う）
#   DEV_CERT_P12          Apple Development 証明書(.p12) を base64 化した文字列（ASC cert id 949Y6ACJ7K・秘密鍵込み）。
#                         これが無いと automatic 署名の Archive が実行ごとに開発証明書をクラウド新規作成し、
#                         アカウントの証明書上限に達して失敗する（2026-07-06 に実際に発生）
#   PROV_PROFILE_APP      com.gymnee.app の App Store 配布プロビジョニングプロファイル(.mobileprovision)を base64 化した文字列
#   PROV_PROFILE_WIDGET   com.gymnee.app.widgets の App Store 配布プロファイルを base64 化した文字列
#   SECRETS_PROD_XCCONFIG （任意）Config/Secrets.prod.xcconfig の中身を base64 化した文字列。未設定だと example で配信＝バックエンド未接続ビルドになる
#
# 必要な「Repository variable」(同画面 → Variables):
#   TESTFLIGHT_ENABLED = true   ← これを設定するまでこの job はスキップ（=シークレット未設定での赤failを防ぐ安全弁）
#
# 署名: Archive は ASC API キーによる自動署名（-allowProvisioningUpdates）、Export は持ち込みの
# 配布証明書(.p12)＋明示プロビジョニングプロファイル(PROV_PROFILE_*)による手動署名。
# （Export に ASC キーを渡すとクラウド署名を試みて権限エラーになるため分離している。）
# App ID/能力/配信証明書は既存の TestFlight 配信実績のものを再利用する。
# ビルド番号は GitHub の run number を使い毎回インクリメントする。

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
      - 'supabase/**'
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false   # アップロード中の job は途中キャンセルしない

jobs:
  deploy:
    name: Build & Upload to TestFlight
    # TESTFLIGHT_ENABLED=true を設定するまではスキップ（シークレット未投入時の誤fail防止）。
    if: ${{ vars.TESTFLIGHT_ENABLED == 'true' }}
    # Apple は App Store Connect アップロードに iOS 26 SDK (Xcode 26+) を必須化。
    # macos-26 イメージに同梱の Xcode 26 を使う。
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SCHEME: Gymnee
      TEAM_ID: PG5P26J3W2
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (latest stable = Xcode 26+)
        run: |
          set -euo pipefail
          # macos-26 既定が 26 系でない場合に備え、明示的に最新の Xcode_26 を選択。
          latest="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest/Contents/Developer"; fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Restore Release secrets config
        # 実鍵入り prod xcconfig を Secret から復元。無ければ example（ローカルのみモード）にフォールバック。
        env:
          SECRETS_PROD_XCCONFIG: ${{ secrets.SECRETS_PROD_XCCONFIG }}
        run: |
          if [ -n "$SECRETS_PROD_XCCONFIG" ]; then
            echo "$SECRETS_PROD_XCCONFIG" | base64 --decode > Config/Secrets.prod.xcconfig
          else
            echo "::warning::SECRETS_PROD_XCCONFIG 未設定。example でビルド＝バックエンド未接続の配信になります。"
            cp Config/Secrets.example.xcconfig Config/Secrets.prod.xcconfig
          fi
          cp -n Config/Secrets.example.xcconfig Config/Secrets.dev.xcconfig || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificates
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DEV_CERT_P12: ${{ secrets.DEV_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          # 途中失敗でも秘密鍵入り .p12 をディスクに残さない。
          trap 'rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/dev_cert.p12"' EXIT
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # 開発証明書（Archive の automatic 署名用）。ランナーは使い捨てのため、これを
          # 持ち込まないと Xcode が毎回クラウドで開発証明書を新規作成し、上限到達で失敗する。
          echo "$DEV_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dev_cert.p12"
          security import "$RUNNER_TEMP/dev_cert.p12" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # ビルド中に証明書を参照できるよう検索リストへ追加＋partition list 設定（UIプロンプト回避）。
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null

      - name: Install provisioning profiles
        # Export の手動署名用に App Store 配布プロファイルを所定の場所へ復元。
        env:
          PROV_PROFILE_APP: ${{ secrets.PROV_PROFILE_APP }}
          PROV_PROFILE_WIDGET: ${{ secrets.PROV_PROFILE_WIDGET }}
        run: |
          set -euo pipefail
          PP="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP"
          echo "$PROV_PROFILE_APP" | base64 --decode > "$PP/gymnee_app_appstore.mobileprovision"
          echo "$PROV_PROFILE_WIDGET" | base64 --decode > "$PP/gymnee_widgets_appstore.mobileprovision"

      - name: Place App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/asc" ~/.appstoreconnect/private_keys ~/.private_keys
          echo "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8"
          # altool は ~/.appstoreconnect/private_keys か ~/.private_keys から .p8 を探す。
          cp "$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8" ~/.appstoreconnect/private_keys/
          cp "$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8" ~/.private_keys/

      - name: Archive (Release, App Store signing)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          # ビルド番号は run number に下駄(+100)を履かせ、既存 TestFlight ビルド(=8)を
          # 常に上回らせる。run number は実行毎に単調増加するので以後も衝突しない。
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          echo "CFBundleVersion = $BUILD_NUMBER"
          xcodebuild archive \
            -project Gymnee.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Gymnee.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey_${ASC_KEY_ID}.p8" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            | tee "$RUNNER_TEMP/archive.log"

      - name: Export IPA
        run: |
          set -euo pipefail
          # 「Install provisioning profiles」で App Store 配布プロファイルを
          # ~/Library/MobileDevice/Provisioning Profiles/ へ復元済み。Export は
          # signingStyle=manual で明示マッピングし、持ち込みの配布証明書(.p12)で署名する。
          # プロファイルは ASC API で作成した手動管理（"Gymnee AppStore" / "Gymnee Widgets AppStore"、
          # PROV_PROFILE_APP / PROV_PROFILE_WIDGET secret）。Associated Domains 対応で
          # Xcode管理(automatic発見)から切替（2026-07 招待ディープリンク導入時）。
          # Export に auth key を渡すとクラウド署名(Apple管理証明書)を試みて権限エラーに
          # なるため渡さない（= 既存のオンディスク・プロファイル＋ローカル証明書に固定）。
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.gymnee.app</key><string>Gymnee AppStore</string>
              <key>com.gymnee.app.widgets</key><string>Gymnee Widgets AppStore</string>
            </dict>
            <key>destination</key><string>export</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Gymnee.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA="$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)"
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
