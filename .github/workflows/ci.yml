name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare secrets config (placeholders for CI)
        # 実鍵入りの Secrets.{dev,prod}.xcconfig は .gitignore 済みで CI には無い。
        # example からプレースホルダを生成して xcodegen の configFiles 検証を満たす
        # （SUPABASE_* は未設定扱い → アプリはローカルのみモードでビルド/テスト）。
        run: |
          cp -n Config/Secrets.example.xcconfig Config/Secrets.dev.xcconfig || true
          cp -n Config/Secrets.example.xcconfig Config/Secrets.prod.xcconfig || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE "[0-9A-F-]{36}")
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Gymnee.xcodeproj \
            -scheme Gymnee \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" \
            | tee xcodebuild.log
